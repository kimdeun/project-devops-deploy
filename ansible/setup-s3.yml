- name: Setup S3 bucket
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - roles/deploy/vars/secrets.yml

  tasks:
    - name: Create S3 bucket
      amazon.aws.s3_bucket:
        name: "{{ vault_s3_bucket }}"
        region: "{{ vault_s3_region }}"
        aws_access_key: "{{ vault_s3_access_key }}"
        aws_secret_key: "{{ vault_s3_secret_key }}"
        endpoint_url: "{{ vault_s3_endpoint }}"
        state: present
