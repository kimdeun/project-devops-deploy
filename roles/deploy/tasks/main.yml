- name: сreate data directory
  ansible.builtin.file:
    path: "{{ app_data_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: сreate logs directory
  ansible.builtin.file:
    path: "{{ app_logs_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: pull docker image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_tag }}"
    source: pull
    force_source: yes
  notify: restart container
